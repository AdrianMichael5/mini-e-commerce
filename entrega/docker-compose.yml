version: "3.9"

networks:
  ecommerce-net:
    driver: bridge

volumes:
  users-data:
  products-data:
  products-replica-data:
  orders-data:

services:
  # ── Users ────────────────────────────────────────────────────────────────
  users:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install --omit=dev && node index.js"
    volumes:
      - ./users:/app
      - users-data:/app/data
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      INTERNAL_KEY: ${INTERNAL_KEY:-internalkey123}
    networks:
      - ecommerce-net
    restart: unless-stopped

  # ── Products (primária) ───────────────────────────────────────────────────
  products:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install --omit=dev && node index.js"
    volumes:
      - ./products:/app
      - products-data:/app/data
    ports:
      - "5002:5002"
    environment:
      PORT: 5002
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      INTERNAL_KEY: ${INTERNAL_KEY:-internalkey123}
      REPLICA_URL: http://products-replica:5012
    networks:
      - ecommerce-net
    restart: unless-stopped

  # ── Products-replica ──────────────────────────────────────────────────────
  products-replica:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install --omit=dev && node index.js"
    volumes:
      - ./products-replica:/app
      - products-replica-data:/app/data
    ports:
      - "5012:5012"
    environment:
      PORT: 5012
      INTERNAL_KEY: ${INTERNAL_KEY:-internalkey123}
    networks:
      - ecommerce-net
    restart: unless-stopped

  # ── Orders ───────────────────────────────────────────────────────────────
  orders:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install --omit=dev && node index.js"
    volumes:
      - ./orders:/app
      - orders-data:/app/data
    ports:
      - "5003:5003"
    environment:
      PORT: 5003
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      PRODUCTS_URL: http://products:5002
    networks:
      - ecommerce-net
    restart: unless-stopped

  # ── Gateway ───────────────────────────────────────────────────────────────
  gateway:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install --omit=dev && node index.js"
    volumes:
      - ./gateway:/app
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      USERS_URL: http://users:5001
      PRODUCTS_URL: http://products:5002
      PRODUCTS_REPLICA_URL: http://products-replica:5012
      ORDERS_URL: http://orders:5003
    depends_on:
      - users
      - products
      - products-replica
      - orders
    networks:
      - ecommerce-net
    restart: unless-stopped
